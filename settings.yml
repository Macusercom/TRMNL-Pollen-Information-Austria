polling_url: https://www.polleninformation.at/api/forecast/public?country={{country}}&lang={{language}}&latitude={{latitude}}&longitude={{longitude}}&apikey={{apikey}}
polling_headers: accept=application/json&content-type=application/json
polling_body: "{ }"
id: 255979
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  category: nature,life
  description: 'Shows current pollen contamination for your location for today and the next 3 days.<br/><br/>To use this plugin you need a free API key. Request one here: <a href="https://www.polleninformation.at/datenschnittstelle/api-key-anfordern" target="_blank">polleninformation.at/datenschnittstelle/api-key-anfordern</a><br/><br/>Data provided by Österreichischer Polleninformationsdienst, <a href="https://www.polleninformation.at" target="_blank">www.polleninformation.at</a>'
  learn_more_url: https://www.polleninformation.at/datenschnittstelle/api-key-anfordern
  github_url: https://github.com/macusercom
- keyname: apikey
  field_type: password
  name: API Key
  description: Your personal API key from the Austrian Pollen Information Service
  placeholder: Your API key
  help_text: Request a free key at <a href="https://www.polleninformation.at/datenschnittstelle/api-key-anfordern" target="_blank">polleninformation.at/datenschnittstelle/api-key-anfordern</a>. The API is provided on a fair-use basis. Please do not poll more than once every 4 hours. Forecast data does not change more frequently. This plugin is pre-configured to refresh every 24 hours.
- keyname: country
  field_type: select
  name: Country
  description: Select your country
  default: AT
  options:
  - Austria: AT
  - Switzerland: CH
  - Germany: DE
  - Spain: ES
  - France: FR
  - United Kingdom: GB
  - Italy: IT
  - Latvia: LV
  - Lithuania: LT
  - Poland: PL
  - Sweden: SE
  - Turkey: TR
  - Ukraine: UA
- keyname: language
  field_type: select
  name: Language
  description: Language for pollen names
  default: de
  options:
  - German: de
  - English: en
  - French: fr
  - Italian: it
  - Spanish: es
  - Polish: pl
  - Swedish: sv
  - Finnish: fi
  - Portuguese: pt
  - Latvian: lv
  - Lithuanian: lt
  - Turkish: tr
  - Hungarian: hu
  - Slovak: sk
  - Ukrainian: uk
  - Russian: ru
- keyname: latitude
  field_type: string
  name: Latitude
  description: Latitude of your location
  placeholder: 48.20671631686089
  help_text: Go to <a href="https://www.latlong.net" target="_blank">latlong.net</a>, search for your location and copy the latitude.
- keyname: longitude
  field_type: string
  name: Longitude
  description: Longitude of your location
  placeholder: 16.350157610474536
  help_text: Go to <a href="https://www.latlong.net" target="_blank">latlong.net</a>, search for your location and copy the longitude.
- keyname: pollen_filter
  field_type: multi_string
  name: Pollen Filter (optional)
  optional: true
  placeholder: Birke, Esche, Gräser
  description: Only show selected pollen types. Leave empty to show all.
  help_text: Enter pollen names in your selected language, separated by commas. Partial matches are supported (e.g. "Bir" matches "Birke").
name: Pollen Information Austria
refresh_interval: 1440
